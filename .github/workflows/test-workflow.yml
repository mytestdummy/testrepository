name: Manually triggered workflow
on:
  workflow_dispatch:
    inputs:
      new-first-commit:
        description: 'New first commit (insert e.g. 6c7d988 or HEAD~15 etc.)'
        required: true
      branch:
        description: 'Branch to be pruned'
        required: true
  # schedule:
    # every 28th day of a month at 23:00
    # - cron: '22 13 16 * *'
    # inputs:
    #   new-first-commit: 30
    #     description: '{N}umber of most recent commits remaining'
    #     required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        token: ${{ secrets.YOUR_TOKEN }}
        fetch-depth: '0'
        ref: ${{ github.event.inputs.branch }}
    - uses: mytestdummy/testaction@master
      with:
        new-first-commit: ${{ github.event.inputs.new-first-commit }}
        branch: ${{ github.event.inputs.branch }}

