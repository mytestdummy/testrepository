name: Manually triggered workflow

# DEFINE YOUR INPUTS FOR NO DISPATCH WORKFLOWS HERE
env:
  NEW-FIRST-COMMIT: HEAD~17 # e.g. HEAD~20
  BRANCH: test # e.g. master
  USER-NAME: github-actions[bot]
  USER-EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  
# DEFINE YOUR WORKFLOW TRIGGERS HERE
on:
  schedule:
    - cron: '30 23 * * *' # e.g. every 28th day of a month at 23:00
  # YOU DON'T HAVE TO DEFINE ANYTHING FOR THE WORKFLOW_DISPATCH HERE
  workflow_dispatch:
    inputs:
      new-first-commit:
        description: 'New first commit'
        required: true
      branch:
        description: 'Branch to be pruned'
        required: true
        default: 'master'
      user-name:
        description: 'User who should commit'
        required: true
        default: 'github-actions[bot]'
      user-email:
        description: 'User e-mail address'
        required: true
        default: '41898282+github-actions[bot]@users.noreply.github.com'

# YOU DON'T HAVE TO DEFINE ANYTHING HERE ;)
jobs:
  commits-cutting:
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ github.event.inputs.branch || env.BRANCH }}
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.YOUR_TOKEN }}
          fetch-depth: '0'
          ref: ${{ github.event.inputs.branch || env.BRANCH }}
      - uses: mytestdummy/testaction@master
        with:
          new-first-commit: ${{ github.event.inputs.new-first-commit || env.NEW-FIRST-COMMIT }}
          branch: ${{ github.event.inputs.branch || env.BRANCH }}
          user-name: ${{ github.event.inputs.user-name || env.USER-NAME }}
          user-email: ${{ github.event.inputs.user-email || env.USER-EMAIL }}

